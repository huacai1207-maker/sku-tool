<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SKU жҷәиғҪз”ҹжҲҗеҷЁ</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --warning: #faad14; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .header h2 { margin: 0; color: #1a1a1a; }
        .header .tip { font-size: 12px; color: #8c8c8c; }

        .layout { display: grid; grid-template-columns: 250px 1fr; gap: 25px; }
        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .input-grids { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 14px; font-weight: bold; color: #444; }
        input, textarea { border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(24,144,255,0.2); }

        textarea { height: 350px; line-height: 1.6; font-family: 'Consolas', monospace; }
        .model-box { background: #fff7e6; }
        .cn-color-box { background: #e6f7ff; border: 2px solid #91d5ff; } /* ејәи°ғдёӯж–Үиҫ“е…Ҙ */
        .en-color-box { background: #f6ffed; }

        .btn-group { grid-column: span 2; display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-clear { background: #f0f0f0; color: #666; max-width: 80px; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .results { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .res-title { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .copy-btn { color: var(--primary); cursor: pointer; text-decoration: underline; }
        .out-area { width: 100%; height: 250px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>SKU жҷәиғҪзј©еҶҷз”ҹжҲҗеҷЁ <small style="font-size: 14px; font-weight: normal; color: var(--success);">в—Ҹ йўңиүІиҮӘеҠЁиҜҶеҲ«е·ІејҖеҗҜ</small></h2>
        <div class="tip">жҸҗзӨәпјҡиҫ“е…Ҙдёӯж–ҮйўңиүІпјҢеҸідҫ§дјҡиҮӘеҠЁеЎ«е…ҘиӢұж–Үзј©еҶҷ</div>
    </div>

    <div class="layout">
        <div class="side-panel">
            <div class="field">
                <label>иӢұж–Үиҙ§еҸ· (Art No.)</label>
                <input type="text" id="enArt" placeholder="еҰӮ: A0001">
            </div>
            <div class="field">
                <label>дёӯж–ҮеҗҚз§° (Name)</label>
                <input type="text" id="cnName" placeholder="еҰӮ: ж—¶е°ҡжүӢжңәеЈі">
            </div>
            <div style="background: #fffbe6; padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid #ffe58f;">
                <strong>зј©еҶҷйҖ»иҫ‘пјҡ</strong><br>
                iPhoneвһ”AP, дёүжҳҹвһ”SM<br>
                й»‘иүІвһ”BK, зҷҪиүІвһ”WH, и“қиүІвһ”BU...
            </div>
        </div>

        <div class="input-grids">
            <div class="field">
                <label>1. еһӢеҸ·еҲ—иЎЁ</label>
                <textarea id="models" class="model-box" placeholder="iPhone17&#10;дёүжҳҹS25"></textarea>
            </div>
            <div class="field">
                <label>2. дёӯж–ҮйўңиүІ (иҫ“е…ҘжӯӨеӨ„)</label>
                <textarea id="cnColors" class="cn-color-box" oninput="autoTranslateColor()" placeholder="й»‘иүІ&#10;зҷҪиүІ&#10;зҙ«иүІ"></textarea>
            </div>
            <div class="field">
                <label>3. иӢұж–Үзј©еҶҷ (иҮӘеҠЁз”ҹжҲҗ/еҸҜж”№)</label>
                <textarea id="enColors" class="en-color-box" placeholder="BK&#10;WH&#10;PP"></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-clear" onclick="location.reload()">йҮҚзҪ®</button>
            <button class="btn-gen" onclick="generate()">вҡЎ з”ҹжҲҗйў„и§Ҳ</button>
            <button id="exportBtn" class="btn-excel" onclick="exportExcel()" disabled>рҹ“Ҙ еҜјеҮә Excel</button>
        </div>

        <div class="results">
            <div class="res-card">
                <div class="res-title"><strong>иӢұж–Ү SKU</strong> <span class="copy-btn" onclick="copyIt('resEn')">еӨҚеҲ¶</span></div>
                <textarea id="resEn" class="out-area" readonly></textarea>
            </div>
            <div class="res-card">
                <div class="res-title"><strong>дёӯж–Ү SKU</strong> <span class="copy-btn" onclick="copyIt('resCn')">еӨҚеҲ¶</span></div>
                <textarea id="resCn" class="out-area" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. йўңиүІиҜҚе…ё (жӮЁеҸҜд»ҘйҡҸж—¶еңЁиҝҷйҮҢж·»еҠ жӣҙеӨҡйўңиүІ)
    const colorDict = {
        "й»‘иүІ": "BK", "й»‘": "BK", "black": "BK",
        "зҷҪиүІ": "WH", "зҷҪ": "WH", "white": "WH",
        "зәўиүІ": "RD", "зәў": "RD", "red": "RD",
        "и“қиүІ": "BU", "и“қ": "BU", "blue": "BU",
        "й»„иүІ": "YL", "й»„": "YL", "yellow": "YL",
        "з»ҝиүІ": "GN", "з»ҝ": "GN", "green": "GN",
        "зҙ«иүІ": "PP", "зҙ«": "PP", "purple": "PP",
        "зІүиүІ": "PK", "зІү": "PK", "pink": "PK",
        "ж©ҷиүІ": "OR", "ж©ҷ": "OR", "orange": "OR",
        "зҒ°иүІ": "GY", "зҒ°": "GY", "grey": "GY", "gray": "GY",
        "йҮ‘иүІ": "GD", "йҮ‘": "GD", "gold": "GD",
        "й“¶иүІ": "SL", "й“¶": "SL", "silver": "SL",
        "йҖҸжҳҺ": "CL", "clear": "CL",
        "жЈ•иүІ": "BR", "иӨҗ": "BR", "brown": "BR"
    };

    const modelAlias = [
        { reg: /iPhone/gi, short: "AP" },
        { reg: /(Samsung|дёүжҳҹ)/gi, short: "SM" },
        { reg: /(Huawei|еҚҺдёә)/gi, short: "HW" },
        { reg: /(Xiaomi|е°Ҹзұі)/gi, short: "MI" }
    ];

    // 2. иҮӘеҠЁзҝ»иҜ‘йўңиүІеҮҪж•°
    function autoTranslateColor() {
        const cnLines = document.getElementById('cnColors').value.split('\n');
        let enLines = [];
        
        cnLines.forEach(line => {
            let trimLine = line.trim();
            if(trimLine === "") {
                enLines.push("");
            } else {
                // жҹҘжүҫиҜҚе…ёпјҢжүҫдёҚеҲ°еҲҷеҸ–жӢјйҹійҰ–еӯ—жҜҚ(з®ҖеҢ–еӨ„зҗҶ)жҲ–дҝқз•ҷеҺҹж ·
                let short = colorDict[trimLine] || trimLine.substring(0, 2).toUpperCase();
                enLines.push(short);
            }
        });
        document.getElementById('enColors').value = enLines.join('\n');
    }

    function getShortModel(str) {
        let res = str;
        modelAlias.forEach(r => res = res.replace(r.reg, r.short));
        return res.replace(/\s+/g, '');
    }

    function getLines(id) {
        return document.getElementById(id).value.split('\n').map(s => s.trim()).filter(s => s !== "");
    }

    let exportData = [];

    function generate() {
        const art = document.getElementById('enArt').value.trim();
        const name = document.getElementById('cnName').value.trim();
        const models = getLines('models');
        const cnColors = getLines('cnColors');
        const enColors = getLines('enColors'); // иҜ»еҸ–еҸҜиғҪиў«з”ЁжҲ·зј–иҫ‘иҝҮзҡ„иӢұж–ҮйўңиүІ

        if (!art || models.length === 0) { alert("иҜ·еЎ«еҶҷиҙ§еҸ·е’ҢеһӢеҸ·пјҒ"); return; }

        let enOut = [], cnOut = [];
        exportData = [];

        models.forEach(m => {
            const sm = getShortModel(m);
            const count = Math.max(cnColors.length, enColors.length);

            if(count === 0) {
                enOut.push(art + sm);
                cnOut.push(name + m);
            } else {
                for (let i = 0; i < count; i++) {
                    const ec = enColors[i] || "";
                    const cc = cnColors[i] || "";
                    const se = art + sm + ec;
                    const sc = name + m + cc;
                    enOut.push(se);
                    cnOut.push(sc);
                    exportData.push({ "иӢұж–ҮSKU": se, "дёӯж–ҮSKU": sc, "иҙ§еҸ·": art, "еһӢеҸ·": m, "йўңиүІ(дёӯ)": cc, "йўңиүІ(иӢұ)": ec });
                }
            }
        });

        document.getElementById('resEn').value = enOut.join('\n');
        document.getElementById('resCn').value = cnOut.join('\n');
        document.getElementById('exportBtn').disabled = false;
    }

    function copyIt(id) {
        const area = document.getElementById(id);
        area.select();
        document.execCommand('copy');
        alert("е·ІеӨҚеҲ¶");
    }

    function exportExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "SKU");
        XLSX.writeFile(wb, `SKUжё…еҚ•_${new Date().getTime()}.xlsx`);
    }
</script>

</body>
</html>
