<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SKU 智能生成器 v7.0 - 一键复制增强版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro"></script>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --copy: #722ed1; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .layout { display: grid; grid-template-columns: 280px 1fr; gap: 25px; }
        .input-grids { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        label { font-size: 14px; font-weight: bold; color: #444; }
        input, textarea, select { border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px; font-size: 14px; }
        textarea { height: 400px; line-height: 1.6; font-family: 'Consolas', monospace; }
        .model-select-area { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 15px; }
        .cn-color-box { background: #fffbe6; border: 2px solid #ffe58f; }
        
        /* 按钮样式 */
        .btn-group { grid-column: span 2; display: flex; gap: 10px; margin-top: 10px; padding-top: 20px; border-top: 1px solid #eee; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-copy { background: var(--copy); color: white; }
        .btn-clear { background: #f0f0f0; color: #666; max-width: 70px; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .results { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 8px; position: relative; }
        .out-area { width: 100%; height: 300px; background: #fdfdfd; border: 1px solid #ddd; padding: 8px; font-size: 13px; margin-top: 10px; box-sizing: border-box; }
        .badge { font-size: 11px; background: #e6f7ff; color: #1890ff; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>SKU 智能生成器 <small>v7.0</small></h2>
        <span class="badge">支持组合颜色、拼音识别、一键复制 & 导出</span>
    </div>

    <div class="layout">
        <div class="side-panel">
            <div class="field">
                <label>英文货号</label>
                <input type="text" id="enArt" placeholder="如: A0001">
            </div>
            <div class="field">
                <label>中文名称</label>
                <input type="text" id="cnName" placeholder="如: xx手机壳">
            </div>
            
            <div class="model-select-area">
                <label style="display:block; margin-bottom:8px;">型号库快捷填充</label>
                <select id="modelLibrary" onchange="fillModel()" style="width:100%;">
                    <option value="">-- 请选择系列 --</option>
                    <option value="apple">Apple 全系列</option>
                    <option value="samsungS">三星 S系列</option>
                    <option value="samsungA">三星 A系列</option>
                    <option value="samsungNote">三星 Note系列</option>
                    <option value="custom">清空</option>
                </select>
            </div>
        </div>

        <div class="input-grids">
            <div class="field">
                <label>1. 型号列表</label>
                <textarea id="models" placeholder="从左侧选择型号..."></textarea>
            </div>
            <div class="field">
                <label>2. 中文颜色</label>
                <textarea id="cnColors" class="cn-color-box" oninput="autoTranslateColor()" placeholder="输入中文颜色&#10;支持组合如：红色+手链"></textarea>
            </div>
            <div class="field">
                <label>3. 英文缩写</label>
                <textarea id="enColors" placeholder="根据中文自动生成..."></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-clear" onclick="location.reload()">重置</button>
            <button class="btn-gen" onclick="generate()">⚡ 生成 SKU 预览</button>
            <button id="btnCopyEn" class="btn-copy" onclick="copyResult('resEn')" disabled>📋 复制全部英文 SKU</button>
            <button id="btnCopyCn" class="btn-copy" onclick="copyResult('resCn')" disabled>📋 复制全部中文 SKU</button>
            <button id="exportBtn" class="btn-excel" onclick="exportExcel()" disabled>📥 导出 Excel 表格</button>
        </div>

        <div class="results">
            <div class="res-card">
                <strong>英文 SKU 预览</strong>
                <textarea id="resEn" class="out-area" readonly></textarea>
            </div>
            <div class="res-card">
                <strong>中文 SKU 预览</strong>
                <textarea id="resCn" class="out-area" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    const { pinyin } = pinyinPro;

    // 内置型号库
    const modelData = {
        apple: "iPhone17\niPhone17Pro\niPhone17ProMax\niPhoneAir\niPhone17E\niPhone16\niPhone16Pro\niPhone16ProMax\niPhone16Plus\niPhone16E\niPhone15\niPhone15Pro\niPhone15ProMax\niPhone15Plus\niPhone14\niPhone14Pro\niPhone14ProMax\niPhone14Plus\niPhone13\niPhone13Pro\niPhone13ProMax\niPhone13Mini\niPhone12\niPhone12Pro\niPhone12ProMax\niPhone12Mini\niPhone11\niPhone11Pro\niPhone11ProMax\niPhoneXS\niPhoneX\niPhoneXSMax\niPhoneXR\niPhone7\niPhone7Plus\niPhone8\niPhone8Plus\niPhoneSE\niPhoneSE2\niPhoneSE3",
        samsungS: "三星S26\n三星S26Plus\n三星S26Ultra\n三星S25\n三星S25Plus\n三星S25Ultra\n三星S25Edge\n三星S25FE\n三星S24\n三星S24Plus\n三星S24Ultra\n三星S24FE\n三星S23\n三星S23Plus\n三星S23Ultra\n三星S23FE\n三星S22\n三星S22Plus\n三星S22Ultra\n三星S21\n三星S21Plus\n三星S21Ultra\n三星S21FE\n三星S20\n三星S20Plus\n三星S20Ultra\n三星S20FE",
        samsungNote: "三星Note20\n三星Note20Ultra\n三星Note10\n三星Note10Plus\n三星Note10Ultra",
        samsungA: "三星A57\n三星A37\n三星A27\n三星A17\n三星A07\n三星A07 4G\n三星A07 5G\n三星A07S\n三星A56\n三星A36\n三星A26\n三星A16\n三星A06\n三星A06 4G\n三星A06 5G\n三星A55\n三星A55 4G\n三星A55 5G\n三星A35\n三星A35 4G\n三星A35 5G\n三星A25\n三星A25 4G\n三星A25 5G\n三星A15\n三星A15 4G\n三星A15 5G\n三星A05\n三星A05S\n三星A54\n三星A54 4G\n三星A54 5G\n三星A34\n三星A34 4G\n三星A34 5G\n三星A24\n三星A24 4G\n三星A24 5G\n三星A14\n三星A14 4G\n三星A14 5G\n三星A04\n三星A04S\n三星A53\n三星A53 4G\n三星A53 5G\n三星A33\n三星A33 4G\n三星A33 5G\n三星A23\n三星A23 4G\n三星A23 5G\n三星A13\n三星A13 4G\n三星A13 5G\n三星A03\n三星A03S\n三星A52\n三星A52 4G\n三星A52 5G\n三星A52S 5G\n三星A32\n三星A32 4G\n三星A32 5G\n三星A22\n三星A22 4G\n三星A22 5G\n三星A12\n三星A12 4G\n三星A12 5G\n三星A02\n三星A02S",
        custom: ""
    };

    const colorDict = {
        "黑色": "BK", "黑": "BK", "白色": "WH", "白": "WH", "红色": "RD", "红": "RD", "蓝色": "BU", "蓝": "BU",
        "黄色": "YL", "黄": "YL", "绿色": "GN", "绿": "GN", "紫色": "PP", "紫": "PP", "粉色": "PK", "粉": "PK",
        "灰色": "GY", "灰": "GY", "金色": "GD", "银色": "SL", "透明": "CL", "手链": "SL", "挂绳": "GS"
    };

    const modelAlias = [
        { reg: /iPhone/gi, short: "AP" },
        { reg: /(Samsung|三星)/gi, short: "SM" }
    ];

    function fillModel() {
        const type = document.getElementById('modelLibrary').value;
        if(type) document.getElementById('models').value = modelData[type];
    }

    function parseColorText(text) {
        if (!text) return "";
        const parts = text.split(/[+\-\/\s]+/);
        const codes = parts.map(part => {
            if (colorDict[part]) return colorDict[part];
            const firstLetters = pinyin(part, { pattern: 'first', toneType: 'none', type: 'array' });
            return firstLetters.join('').toUpperCase();
        });
        return codes.join('');
    }

    function autoTranslateColor() {
        const lines = document.getElementById('cnColors').value.split('\n');
        const enLines = lines.map(line => parseColorText(line.trim()));
        document.getElementById('enColors').value = enLines.join('\n');
    }

    function getShortModel(str) {
        let res = str;
        modelAlias.forEach(r => res = res.replace(r.reg, r.short));
        return res.replace(/\s+/g, '');
    }

    let exportData = [];

    function generate() {
        const art = document.getElementById('enArt').value.trim();
        const name = document.getElementById('cnName').value.trim();
        const models = document.getElementById('models').value.split('\n').map(s => s.trim()).filter(s => s);
        const cnColors = document.getElementById('cnColors').value.split('\n').map(s => s.trim());
        const enColors = document.getElementById('enColors').value.split('\n').map(s => s.trim());

        if (!art || models.length === 0) { alert("请填写货号和型号！"); return; }

        let enOut = [], cnOut = [];
        exportData = [];

        models.forEach(m => {
            const sm = getShortModel(m);
            const count = Math.max(cnColors.length, enColors.length);

            for (let i = 0; i < count; i++) {
                const cc = cnColors[i] || "";
                const ec = enColors[i] || "";
                if (!cc && !ec) continue;

                const se = art + sm + ec;
                const sc = name + m + cc;
                enOut.push(se);
                cnOut.push(sc);
                exportData.push({ "英文SKU": se, "中文SKU": sc, "型号": m, "颜色": cc });
            }
        });

        document.getElementById('resEn').value = enOut.join('\n');
        document.getElementById('resCn').value = cnOut.join('\n');
        
        // 激活按钮
        document.getElementById('exportBtn').disabled = false;
        document.getElementById('btnCopyEn').disabled = false;
        document.getElementById('btnCopyCn').disabled = false;
    }

    function copyResult(id) {
        const text = document.getElementById(id);
        if (!text.value) return;
        text.select();
        document.execCommand('copy');
        
        // 简单的成功反馈
        const btnId = id === 'resEn' ? 'btnCopyEn' : 'btnCopyCn';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerText;
        btn.innerText = "✅ 复制成功！";
        setTimeout(() => { btn.innerText = originalText; }, 1500);
    }

    function exportExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "SKU清单");
        XLSX.writeFile(wb, `SKU_${new Date().getTime()}.xlsx`);
    }
</script>

</body>
</html>
