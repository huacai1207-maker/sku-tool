<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SKU 智能生成器</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --warning: #faad14; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .header h2 { margin: 0; color: #1a1a1a; }
        .header .tip { font-size: 12px; color: #8c8c8c; }

        .layout { display: grid; grid-template-columns: 250px 1fr; gap: 25px; }
        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .input-grids { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 14px; font-weight: bold; color: #444; }
        input, textarea { border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(24,144,255,0.2); }

        textarea { height: 350px; line-height: 1.6; font-family: 'Consolas', monospace; }
        .model-box { background: #fff7e6; }
        .cn-color-box { background: #e6f7ff; border: 2px solid #91d5ff; } /* 强调中文输入 */
        .en-color-box { background: #f6ffed; }

        .btn-group { grid-column: span 2; display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-clear { background: #f0f0f0; color: #666; max-width: 80px; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .results { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .res-card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .res-title { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .copy-btn { color: var(--primary); cursor: pointer; text-decoration: underline; }
        .out-area { width: 100%; height: 250px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>SKU 智能生成器 <small style="font-size: 14px; font-weight: normal; color: var(--success);">● 颜色自动识别已开启</small></h2>
        <div class="tip">提示：输入中文颜色，右侧会自动填入英文缩写</div>
    </div>

    <div class="layout">
        <div class="side-panel">
            <div class="field">
                <label>英文货号 (Art No.)</label>
                <input type="text" id="enArt" placeholder="如: A0001">
            </div>
            <div class="field">
                <label>中文名称 (Name)</label>
                <input type="text" id="cnName" placeholder="如: 时尚手机壳">
            </div>
            <div style="background: #fffbe6; padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid #ffe58f;">
                <strong>缩写逻辑：</strong><br>
                iPhone➔AP, 三星➔SM<br>
                黑色➔BK, 白色➔WH, 蓝色➔BU...
            </div>
        </div>

        <div class="input-grids">
            <div class="field">
                <label>1. 型号列表</label>
                <textarea id="models" class="model-box" placeholder="iPhone17&#10;三星S25"></textarea>
            </div>
            <div class="field">
                <label>2. 中文颜色 (输入此处)</label>
                <textarea id="cnColors" class="cn-color-box" oninput="autoTranslateColor()" placeholder="黑色&#10;白色&#10;紫色"></textarea>
            </div>
            <div class="field">
                <label>3. 英文缩写 (自动生成/可改)</label>
                <textarea id="enColors" class="en-color-box" placeholder="BK&#10;WH&#10;PP"></textarea>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-clear" onclick="location.reload()">重置</button>
            <button class="btn-gen" onclick="generate()">⚡ 生成预览</button>
            <button id="exportBtn" class="btn-excel" onclick="exportExcel()" disabled>📥 导出 Excel</button>
        </div>

        <div class="results">
            <div class="res-card">
                <div class="res-title"><strong>英文 SKU</strong> <span class="copy-btn" onclick="copyIt('resEn')">复制</span></div>
                <textarea id="resEn" class="out-area" readonly></textarea>
            </div>
            <div class="res-card">
                <div class="res-title"><strong>中文 SKU</strong> <span class="copy-btn" onclick="copyIt('resCn')">复制</span></div>
                <textarea id="resCn" class="out-area" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 颜色词典 (您可以随时在这里添加更多颜色)
    const colorDict = {
        "黑色": "BK", "黑": "BK", "black": "BK",
        "白色": "WH", "白": "WH", "white": "WH",
        "红色": "RD", "红": "RD", "red": "RD",
        "蓝色": "BU", "蓝": "BU", "blue": "BU",
        "黄色": "YL", "黄": "YL", "yellow": "YL",
        "绿色": "GN", "绿": "GN", "green": "GN",
        "紫色": "PP", "紫": "PP", "purple": "PP",
        "粉色": "PK", "粉": "PK", "pink": "PK",
        "橙色": "OR", "橙": "OR", "orange": "OR",
        "灰色": "GY", "灰": "GY", "grey": "GY", "gray": "GY",
        "金色": "GD", "金": "GD", "gold": "GD",
        "银色": "SL", "银": "SL", "silver": "SL",
        "透明": "CL", "clear": "CL",
        "棕色": "BR", "褐": "BR", "brown": "BR"
    };

    const modelAlias = [
        { reg: /iPhone/gi, short: "AP" },
        { reg: /(Samsung|三星)/gi, short: "SM" },
        { reg: /(Huawei|华为)/gi, short: "HW" },
        { reg: /(Xiaomi|小米)/gi, short: "MI" }
    ];

    // 2. 自动翻译颜色函数
    function autoTranslateColor() {
        const cnLines = document.getElementById('cnColors').value.split('\n');
        let enLines = [];
        
        cnLines.forEach(line => {
            let trimLine = line.trim();
            if(trimLine === "") {
                enLines.push("");
            } else {
                // 查找词典，找不到则取拼音首字母(简化处理)或保留原样
                let short = colorDict[trimLine] || trimLine.substring(0, 2).toUpperCase();
                enLines.push(short);
            }
        });
        document.getElementById('enColors').value = enLines.join('\n');
    }

    function getShortModel(str) {
        let res = str;
        modelAlias.forEach(r => res = res.replace(r.reg, r.short));
        return res.replace(/\s+/g, '');
    }

    function getLines(id) {
        return document.getElementById(id).value.split('\n').map(s => s.trim()).filter(s => s !== "");
    }

    let exportData = [];

    function generate() {
        const art = document.getElementById('enArt').value.trim();
        const name = document.getElementById('cnName').value.trim();
        const models = getLines('models');
        const cnColors = getLines('cnColors');
        const enColors = getLines('enColors'); // 读取可能被用户编辑过的英文颜色

        if (!art || models.length === 0) { alert("请填写货号和型号！"); return; }

        let enOut = [], cnOut = [];
        exportData = [];

        models.forEach(m => {
            const sm = getShortModel(m);
            const count = Math.max(cnColors.length, enColors.length);

            if(count === 0) {
                enOut.push(art + sm);
                cnOut.push(name + m);
            } else {
                for (let i = 0; i < count; i++) {
                    const ec = enColors[i] || "";
                    const cc = cnColors[i] || "";
                    const se = art + sm + ec;
                    const sc = name + m + cc;
                    enOut.push(se);
                    cnOut.push(sc);
                    exportData.push({ "英文SKU": se, "中文SKU": sc, "货号": art, "型号": m, "颜色(中)": cc, "颜色(英)": ec });
                }
            }
        });

        document.getElementById('resEn').value = enOut.join('\n');
        document.getElementById('resCn').value = cnOut.join('\n');
        document.getElementById('exportBtn').disabled = false;
    }

    function copyIt(id) {
        const area = document.getElementById(id);
        area.select();
        document.execCommand('copy');
        alert("已复制");
    }

    function exportExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "SKU");
        XLSX.writeFile(wb, `SKU清单_${new Date().getTime()}.xlsx`);
    }
</script>

</body>
</html>
